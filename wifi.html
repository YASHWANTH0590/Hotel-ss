<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifi | SS GRAND INN</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏨</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">



<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Times New Roman', Times, serif

}
:root{
    --charcoal:#121212;
    --charcoal-dark:#0A0A0A;
    --charcoal-card:#1C1C1C;
    --charcoal-field:#161616;
    --gold:#D4AF37;
    --gold-soft:#C9A66B;
    --gold-pale:#E8D9B5;
    --cream:#F2EDE2;
    --muted:#9C9282;
    --border-gold:rgba(212,175,55,.25);
}

body{
    background:var(--charcoal);
    color:var(--cream);
    min-height:100vh;
    font-family:'time',sans-serif;
    background-image:
        radial-gradient(circle at 15% 0%, rgba(212,175,55,.06), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(212,175,55,.05), transparent 45%);
}


.navbar{
    background:var(--charcoal-dark);
    border-bottom:3px solid var(--border-gold);
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    line-height:0;
}

.logo img{
    height: 75px;
    width:auto;
    display:block;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}


.lang-btn{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:clamp(6px, 1.6vw, 10px) clamp(10px, 3vw, 18px);
    border-radius:10px;
    font-weight:600;
    font-size:clamp(11px, 2.6vw, 14px);
    cursor:pointer;
    transition:.3s;
    white-space:nowrap;
    flex-shrink:0;
}

.lang-btn:hover{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.container{
    flex:1;
    max-width:480px;
    margin:auto;
    padding:60px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.wifi-icon{
    font-size:50px;
    color:var(--gold);
    margin-bottom:18px;
    filter:drop-shadow(0 0 8px rgba(212,175,55,.3));
}

.page-title{
    color:var(--gold-pale);
    font-family:'Times New Roman', Times, serif;
    font-weight:600;
    font-size:24px;
    margin-bottom:6px;
    text-align:center;
}

.page-sub{
    color:var(--muted);
    font-size:14px;
    margin-bottom:35px;
    text-align:center;
}

.wifi-card{
    width:100%;
    background:var(--charcoal-card);
    border:1px solid var(--border-gold);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    margin-bottom: 0;
}
.field{
    margin-bottom:22px;
}

.field:last-child{
    margin-bottom:0;
}

.field-label{
    display:block;
    color:var(--gold-soft);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:8px;
}

.field-value-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:var(--charcoal-field);
    border:1px solid var(--border-gold);
    border-radius:12px;
    padding:14px 16px;
}

.field-value{
    color:var(--cream);
    font-size:18px;
    font-weight:600;
    font-family:'Times New Roman', Times, serif;
    letter-spacing:.5px;
    word-break:break-all;
}

.copy-btn{
    background:transparent;
    border:1px solid var(--border-gold);
    color:var(--gold);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-size:15px;
    flex-shrink:0;
    transition:.25s;
    font-family:'Times New Roman', Times, serif
}

.copy-btn:hover{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.copy-btn.copied{
    background:var(--gold);
    color:var(--charcoal-dark);
}
.footer{
    text-align:center;
    padding:20px 15px;
    color:#F2EDE2;
    font-size:14px;
    width:100%;
    border-top:1px solid rgba(212,175,55,.15);
    margin-top:auto;
}

.footer a{
    color:#F2EDE2;
    text-decoration:none;
}

.footer a:hover{
    color:#D4AF37;

}

@media(max-width:768px){
    .navbar{
        flex-shrink:0;
        padding:8px 14px;
    }
    .logo img{
        height:70px;
    }
    .footer{
        padding:40px 15px 25px;
    }

    .footer h2{
        font-size:1.6rem;
    }

    .social-icons a{
        width:45px;
        height:45px;
        font-size:20px;
    }
}


</style>
</head>
<body>

<nav class="navbar">
<a href="index.html" class="logo">
    <img src="/Img/logo.png" alt="SS Grand Inn Logo">
</a>
    <!-- <a class="back-btn" href="index.html">← Back</a> -->
</nav>

<div class="container">

    <div class="wifi-icon">📶</div>
<div class="page-title" id="wifiTitle">
    WiFi Access
</div>

<div class="page-sub" id="wifiSub">
    Connect to our complimentary high-speed WiFi
</div>

    <div class="wifi-card">

        <div class="field">
            <span class="field-label">Network Name</span>
            <div class="field-value-row">
                <span class="field-value" id="wifiName">SS_HOTELS_GUEST</span>
                <button class="copy-btn" onclick="copyText('wifiName', this)">Copy</button>
            </div>
        </div>

        <div class="field">
            <span class="field-label">Password</span>
            <div class="field-value-row">
                <span class="field-value" id="wifiPass">........</span>
                <button class="copy-btn" onclick="copyText('wifiPass', this)">Copy</button>
            </div>
        </div>

    </div>

</div>


<script>
function copyText(id, btn){
    const text = document.getElementById(id).innerText;

    navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerText;
        btn.innerText = "Copied";
        btn.classList.add("copied");

        setTimeout(() => {
            btn.innerText = original;
            btn.classList.remove("copied");
        }, 1500);
    });
}

const lang = localStorage.getItem("lang") || "en";

if(lang === "te"){

    document.getElementById("wifiTitle").innerHTML =
    "వైఫై యాక్సెస్";

    document.getElementById("wifiSub").innerHTML =
    "మా ఉచిత హై-స్పీడ్ వైఫైకి కనెక్ట్ అవ్వండి";

    document.getElementById("networkLabel").innerHTML =
    "నెట్‌వర్క్ పేరు";

    document.getElementById("passwordLabel").innerHTML =
    "పాస్‌వర్డ్";
}
</script>
 
<footer>
<p class="footer">
    <a href="/index.html">
        © SS Grand Inn • Luxury Stay, Exceptional Hospitality
    </a>
</p>
    </footer>


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifi | SS GRAND INN</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏨</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
font-family:'Cormorant Garamond', serif;

}
:root{
    --navy:#001236;
    --gold:#D4AF37;
    --cream:#EFEAE5;
    --darkcream:#D8D0C4;
    --white:#FFFFFF;
}

body{
    background:#EFEAE5;
    color:#001236;
    min-height:100vh;
    min-height:100vh;
    display:flex;
    flex-direction:column;

    background-image:
        radial-gradient(circle at 15% 0%, rgba(212,175,55,.08), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(0,18,54,.05), transparent 45%);
}


.navbar{
 background:#001236;
    border-bottom:2px solid #D4AF37;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    line-height:0;
}

.logo img{
    height: 75px;
    width:auto;
    display:block;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}


.lang-btn{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:clamp(6px, 1.6vw, 10px) clamp(10px, 3vw, 18px);
    border-radius:10px;
    font-weight:600;
    font-size:clamp(11px, 2.6vw, 14px);
    cursor:pointer;
    transition:.3s;
    white-space:nowrap;
    flex-shrink:0;
}

.lang-btn:hover{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.container{
    flex:1;
    max-width:480px;
    margin:auto;
    padding:60px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.wifi-icon{
    font-size:55px;
    color:#D4AF37;
}

.page-title{
    color:#001236;
font-family:'Cormorant Garamond', serif;
    font-size:34px;
    font-weight:700;
}
.page-sub{
    color:#666;
    font-size:14px;
}
.wifi-card{
    width:100%;
    max-width:550px;
    background:#D8D0C4;
    border:2px solid #D4AF37;
    border-radius:18px;
    padding:30px;
    margin-top: 25px;
}

.field{
    margin-bottom:22px;
}

.field:last-child{
    margin-bottom:0;
}

.field-label{
    color:#001236;
    font-weight:600;
    letter-spacing:1px;
}

.field-value-row{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:#F8F6F0;
    border:1px solid rgba(212,175,55,.35);
    border-radius:12px;

    padding:12px 14px;
}

.field-value{
    color:#001236;
    font-weight:600;
}

.copy-btn{
    background:#001236;
    color:#fff;
    border:none;
    border-radius:8px;

    padding:8px 16px;
    font-size:14px;
    font-weight:600;
}
.copy-btn:hover{
    background:#D4AF37;
    color:#001236;
}

.copy-btn.copied{
    background:var(--gold);
    color:var(--charcoal-dark);
}
.footer{
    background:#001236;
    color:#F2EDE2;

    text-align:center;

    padding:12px;
    font-size:12px;

    width:100%;
    margin-top:auto;
}

.footer a{
    color:#F2EDE2;
    text-decoration:none;
}

.footer a:hover{
    color:#D4AF37;
}
.container{
    min-height:calc(100vh - 170px);
    display:flex;
    justify-content:center;
    align-items:center;
}
@media(max-width:768px){

    .navbar{
        padding:8px 12px;
        margin-bottom:10px;
        height: 68px;
    }
    .logo img{
        height:50px;
    }
    .footer{
        padding:40px 15px 25px;
    }

    .footer h2{
        font-size:1.6rem;
    }

    .social-icons a{
        width:45px;
        height:45px;
        font-size:20px;
    }

.footer{
    background:#001236;
    color:#F2EDE2;

    text-align:center;

    padding:12px;
    font-size:12px;

    width:100%;
    margin-top:auto;
}

.footer a{
    color:#F8F6F0;        /* Ivory */
    text-decoration:none;
    transition:0.3s;
}
.footer a:hover{
    color:#D4AF37;
}
}


</style>
</head>
<body>

<nav class="navbar">
<a href="home.html" class="logo">
    <img src="/Img/logo.png" alt="SS Grand Inn Logo">
</a>
    <!-- <a class="back-btn" href="index.html">← Back</a> -->
</nav>

<div class="container">

    <div class="wifi-icon">📶</div>
<div class="page-title" id="wifiTitle">
    WiFi Access
</div>

<div class="page-sub" id="wifiSub">
    Connect to our complimentary high-speed WiFi
</div>

    <div class="wifi-card">

        <div class="field">
            <span class="field-label">Network Name</span>
            <div class="field-value-row">
                <span class="field-value" id="wifiName">SS_HOTELS_GUEST</span>
                <button class="copy-btn" onclick="copyText('wifiName', this)">Copy</button>
            </div>
        </div>

        <div class="field">
            <span class="field-label">Password</span>
            <div class="field-value-row">
                <span class="field-value" id="wifiPass">........</span>
                <button class="copy-btn" onclick="copyText('wifiPass', this)">Copy</button>
            </div>
        </div>

    </div>

</div>


<script>
function copyText(id, btn){
    const text = document.getElementById(id).innerText;

    navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerText;
        btn.innerText = "Copied";
        btn.classList.add("copied");

        setTimeout(() => {
            btn.innerText = original;
            btn.classList.remove("copied");
        }, 1500);
    });
}

const lang = localStorage.getItem("lang") || "en";

if(lang === "te"){

    document.getElementById("wifiTitle").innerHTML =
    "వైఫై యాక్సెస్";

    document.getElementById("wifiSub").innerHTML =
    "మా ఉచిత హై-స్పీడ్ వైఫైకి కనెక్ట్ అవ్వండి";

    document.getElementById("networkLabel").innerHTML =
    "నెట్‌వర్క్ పేరు";

    document.getElementById("passwordLabel").innerHTML =
    "పాస్‌వర్డ్";
}
</script>
 
<footer>
<p class="footer">
    <a href="/index.html">
        © SS Grand Inn • Luxury Stay, Exceptional Hospitality
    </a>
</p>
    </footer>


</body>
</html>

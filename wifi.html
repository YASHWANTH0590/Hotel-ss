<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">



<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Times New Roman', Times, serif

}
:root{
    --charcoal:#121212;
    --charcoal-dark:#0A0A0A;
    --charcoal-card:#1C1C1C;
    --charcoal-field:#161616;
    --gold:#D4AF37;
    --gold-soft:#C9A66B;
    --gold-pale:#E8D9B5;
    --cream:#F2EDE2;
    --muted:#9C9282;
    --border-gold:rgba(212,175,55,.25);
}

body{
    background:var(--charcoal);
    color:var(--cream);
    min-height:100vh;
    font-family:'time',sans-serif;
    background-image:
        radial-gradient(circle at 15% 0%, rgba(212,175,55,.06), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(212,175,55,.05), transparent 45%);
}


.navbar{
    height:65px;
    background:var(--charcoal-dark);
    border-bottom:1px solid var(--border-gold);
    padding:18px clamp(20px, 4vw, 30px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

        .logo {
            background: linear-gradient(120deg, var(--gold-pale), var(--gold), var(--gold-soft));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
           
            font-weight: 700;
            letter-spacing: clamp(1px, 1vw, 4px);
            text-decoration: none;
            font-size: clamp(14px, 4.6vw, 20px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }


.lang-btn{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:clamp(6px, 1.6vw, 10px) clamp(10px, 3vw, 18px);
    border-radius:10px;
    font-weight:600;
    font-size:clamp(11px, 2.6vw, 14px);
    cursor:pointer;
    transition:.3s;
    white-space:nowrap;
    flex-shrink:0;
}

.lang-btn:hover{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.container{
    max-width:480px;
    margin:auto;
    padding:60px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.wifi-icon{
    font-size:50px;
    color:var(--gold);
    margin-bottom:18px;
    filter:drop-shadow(0 0 8px rgba(212,175,55,.3));
}

.page-title{
    color:var(--gold-pale);
    font-family:'Times New Roman', Times, serif;
    font-weight:600;
    font-size:24px;
    margin-bottom:6px;
    text-align:center;
}

.page-sub{
    color:var(--muted);
    font-size:14px;
    margin-bottom:35px;
    text-align:center;
}

.wifi-card{
    width:100%;
    background:var(--charcoal-card);
    border:1px solid var(--border-gold);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    margin-bottom: 0;
}
.field{
    margin-bottom:22px;
}

.field:last-child{
    margin-bottom:0;
}

.field-label{
    display:block;
    color:var(--gold-soft);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:8px;
}

.field-value-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:var(--charcoal-field);
    border:1px solid var(--border-gold);
    border-radius:12px;
    padding:14px 16px;
}

.field-value{
    color:var(--cream);
    font-size:18px;
    font-weight:600;
    font-family:'Times New Roman', Times, serif;
    letter-spacing:.5px;
    word-break:break-all;
}

.copy-btn{
    background:transparent;
    border:1px solid var(--border-gold);
    color:var(--gold);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-size:15px;
    flex-shrink:0;
    transition:.25s;
    font-family:'Times New Roman', Times, serif
}

.copy-btn:hover{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.copy-btn.copied{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.footer{
    text-align:center;
    margin-top:40px;
    padding:20px;
    color:var(--gold-soft);
    letter-spacing:.5px;
    font-size:14px;
}



.footer{
    background:#0A0A0A;
    border-top:1px solid rgba(212,175,55,0.25);
    padding:10px 10px 10px;
    text-align:center;
    color:#F2EDE2;
    margin-top:80px;
}

.footer h2{
    color:#D4AF37;
    font-size:2rem;
    margin-bottom:15px;
    letter-spacing:3px;
    font-weight:700;
    text-transform:uppercase;
}

.footer p{
    color:#C9C9C9;
    margin:8px 0;
    font-size:15px;
    line-height:1.6;
}
.social-icons{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:25px 0;
}

.social-icons a{
    width:50px;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    border:1px solid #D4AF37;
    color:#D4AF37;
    text-decoration:none;
    font-size:22px;
    transition:.3s;
}

.social-icons a:hover{
    background:#D4AF37;
    color:#121212;
}
.social-icons a:hover{
    background:#D4AF37;
    color:#121212;
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(212,175,55,0.4);
}

.copyright{
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid rgba(212,175,55,0.15);
    color:#8F8F8F;
    font-size:14px;
    letter-spacing:1px;
}

@media(max-width:768px){
    .footer{
        padding:40px 15px 25px;
    }

    .footer h2{
        font-size:1.6rem;
    }

    .social-icons a{
        width:45px;
        height:45px;
        font-size:20px;
    }
}


</style>
</head>
<body>

<nav class="navbar">
        <a href="index.html" class="logo">
    SS GRAND INN
</a>
    <!-- <a class="back-btn" href="index.html">← Back</a> -->
</nav>

<div class="container">

    <div class="wifi-icon">📶</div>
    <div class="page-title">WiFi Access</div>
    <div class="page-sub">Connect to our complimentary high-speed WiFi</div>

    <div class="wifi-card">

        <div class="field">
            <span class="field-label">Network Name</span>
            <div class="field-value-row">
                <span class="field-value" id="wifiName">SS_HOTELS_GUEST</span>
                <button class="copy-btn" onclick="copyText('wifiName', this)">Copy</button>
            </div>
        </div>

        <div class="field">
            <span class="field-label">Password</span>
            <div class="field-value-row">
                <span class="field-value" id="wifiPass">........</span>
                <button class="copy-btn" onclick="copyText('wifiPass', this)">Copy</button>
            </div>
        </div>

    </div>

</div>


<script>
function copyText(id, btn){
    const text = document.getElementById(id).innerText;

    navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerText;
        btn.innerText = "Copied";
        btn.classList.add("copied");

        setTimeout(() => {
            btn.innerText = original;
            btn.classList.remove("copied");
        }, 1500);
    });
}
</script>

</div>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | SS GRAND INN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --navy:#001236;
    --gold:#D4AF37;
    --cream:#EFEAE5;
    --white:#FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
html,

body{
 min-height:100vh;
    position:relative;   /* IMPORTANT */
    overflow:hidden;
    background:
        radial-gradient(circle at top left,
        rgba(212,175,55,.10), transparent 35%),

        radial-gradient(circle at bottom right,
        rgba(0,18,54,.08), transparent 40%),

        #EFEAE5;

    display:flex;
    justify-content:center;
    align-items:center;
    
}
/* Background Decorations */

.circle{
    position:fixed;      /* instead of absolute */
    border-radius:50%;
    background:rgba(212,175,55,0.08);
    z-index:-1;
}

.circle1{
    width:350px;
    height:350px;
    top:-180px;
    left:-180px;
}

.circle2{
    width:450px;
    height:450px;
    bottom:-250px;
    right:-250px;
}

.hero{
    text-align:center;
    width:90%;
    max-width:900px;
    z-index:1;
}

/* Logo */

.logo{
    width:220px;
    max-width:80%;
    height:auto;
    display:block;
    margin:0 auto 25px;
}

/* Heading */

.hero h1{
    font-family:'Cormorant Garamond',serif;
    color:#001236;
    font-size:clamp(40px,6vw,60px);
    font-weight:500;
    margin-bottom:0;
}

/* Location */

.location{
    color:#001236;
    font-size:15px;
    font-weight:600;
    letter-spacing:3px;
    margin-top:10px;
}
.hotel-name{
    font-family:'Cormorant Garamond', serif;
    color:#D4AF37;
    font-size:40px;
    font-weight:700;
    letter-spacing:3px;
}

.hotel-name .big{
    font-size:1.5em;
    line-height:0;
    display:inline-block;
}
/* Divider */

.divider{
    width:180px;
    height:3px;
    margin:25px auto;
    background:linear-gradient(
        to right,
        transparent,
        var(--gold),
        transparent
    );
}

/* Caption */

.caption{
    color:#555;
    font-size:18px;
    line-height:1.8;
    max-width:650px;
    margin:0 auto;
}

/* Button */

.btn{
    display:inline-block;
    margin-top:40px;
    background:var(--navy);
    color:white;
    text-decoration:none;
    padding:16px 45px;
    border-radius:50px;
    font-size:16px;
    font-weight:600;
    border:2px solid var(--navy);
    transition:all .3s ease;
}

.btn:hover{
    background:var(--gold);
    border-color:var(--gold);
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(212,175,55,.25);
}
.lang-btn{
    position:fixed;
    top:20px;
    right:20px;

    background:var(--cream);
    color:#D4AF37;

    border:1px solid #D4AF37;
    border-radius:12px;

    padding:10px 18px;
    font-size:14px;
    font-weight:600;

    cursor:pointer;
    transition:.3s;
    z-index:999;
}

.lang-btn:hover{
    background:#D4AF37;
    color:#001236;
}
/* Mobile */

@media(max-width:768px){
        .lang-btn{
        top:15px;
        right:15px;

        padding:8px 14px;
        font-size:12px;
    }

    .logo{
        width:200px;
    }

    .hero h1{
        font-size:42px;
    }

    .location{
        font-size:18px;
    }

    .caption{
        font-size:15px;
        padding:0 10px;
    }

    .btn{
        padding:14px 35px;
    }
.circle{
    position:fixed;
    z-index:-1;
}
.circle1{
        width:180px;
        height:180px;
        top:-90px;
        left:-90px;
    }

    .circle2{
        width:180px;
        height:180px;
        bottom:-90px;
        right:-90px;
    }

    .hero{
        width:100%;
        padding:0 20px;
    }

    .hotel-name{
        font-size:32px;
        letter-spacing:1px;
    }
}

</style>
</head>
<body>
    <button class="lang-btn" onclick="changeLanguage()">
    EN / TE
</button>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="hero">

    <!-- Replace with your logo -->
    <img src="Img/logo main.png" alt="SS Grand Inn" class="logo">
<h1 id="welcomeText">Welcome to</h1>

<h2 class="hotel-name">
    <span class="big">SS</span> <span class="big">G</span>RAND <span class="big">I</span>NN
</h2>

<div class="location" id="locationText">
    SAMARALAKOTA
</div>

<p class="caption" id="captionText">
    Experience luxury, comfort and exceptional hospitality.
    We are delighted to have you with us and wish you a pleasant stay.
</p>

<a href="home.html" class="btn" id="startBtn">
    Get Started →
</a>
</div>

<script>
    
function changeLanguage(){
    let lang = localStorage.getItem("lang") || "en";
    localStorage.setItem("lang", lang === "en" ? "te" : "en");
    location.reload();
}

const lang = localStorage.getItem("lang") || "en";

if(lang === "te"){

    document.getElementById("welcomeText").innerHTML =
    "స్వాగతం";

    document.getElementById("locationText").innerHTML =
    "సామర్లకోట";

    document.getElementById("captionText").innerHTML =
    "లగ్జరీ, సౌకర్యం మరియు అద్భుతమైన ఆతిథ్యాన్ని అనుభవించండి. మీకు సంతోషకరమైన బస కలగాలని కోరుకుంటున్నాము.";

    document.getElementById("startBtn").innerHTML =
    "ప్రారంభించండి →";
}

</script>

</body>
</html>

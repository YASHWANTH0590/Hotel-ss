
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | SS GRAND INN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --navy:#001236;
    --gold:#D4AF37;
    --cream:#EFEAE5;
    --white:#FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    background:
        radial-gradient(circle at top left,
        rgba(212,175,55,.10), transparent 35%),

        radial-gradient(circle at bottom right,
        rgba(0,18,54,.08), transparent 40%),

        #EFEAE5;

    display:flex;
    justify-content:center;
    align-items:center;
}
/* Background Decorations */

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(212,175,55,0.08);
}

.circle1{
    width:350px;
    height:350px;
    top:-120px;
    left:-120px;
}

.circle2{
    width:450px;
    height:450px;
    bottom:-180px;
    right:-180px;
}

.hero{
    text-align:center;
    width:90%;
    max-width:900px;
    z-index:1;
}

/* Logo */

.logo{
    width:220px;
    max-width:80%;
    margin-bottom:25px;

    background:#001236;
    
    padding:18px 25px;
    border-radius:18px;

    box-shadow:
        0 10px 30px rgba(0,18,54,.15),
        0 0 0 2px rgba(212,175,55,.15);
}

/* Heading */

.hero h1{
    font-family:'Cormorant Garamond',serif;
    color:#001236;
    font-size:clamp(40px,6vw,60px);
    font-weight:500;
    margin-bottom:0;
}

/* Location */

.location{
    color:#001236;
    font-size:15px;
    font-weight:600;
    letter-spacing:3px;
    margin-top:10px;
}
.hotel-name{
    font-family:'Cormorant Garamond',serif;
    color:#D4AF37;
    font-size:40px;
    font-weight:700;
    letter-spacing:3px;
    margin-top:-8px;
    text-shadow:
        0 2px 0 rgba(0,0,0,.08),
        0 4px 12px rgba(212,175,55,.25);
}
/* Divider */

.divider{
    width:180px;
    height:3px;
    margin:25px auto;
    background:linear-gradient(
        to right,
        transparent,
        var(--gold),
        transparent
    );
}

/* Caption */

.caption{
    color:#555;
    font-size:18px;
    line-height:1.8;
    max-width:650px;
    margin:0 auto;
}

/* Button */

.btn{
    display:inline-block;
    margin-top:40px;
    background:var(--navy);
    color:white;
    text-decoration:none;
    padding:16px 45px;
    border-radius:50px;
    font-size:16px;
    font-weight:600;
    border:2px solid var(--navy);
    transition:all .3s ease;
}

.btn:hover{
    background:var(--gold);
    border-color:var(--gold);
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(212,175,55,.25);
}

/* Mobile */

@media(max-width:768px){

    .logo{
        width:170px;
    }

    .hero h1{
        font-size:42px;
    }

    .location{
        font-size:18px;
    }

    .caption{
        font-size:15px;
        padding:0 10px;
    }

    .btn{
        padding:14px 35px;
    }
}

</style>
</head>
<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="hero">

    <!-- Replace with your logo -->
    <img src="Img/logo.png" alt="SS Grand Inn" class="logo">
<h1>Welcome to</h1>

<h2 class="hotel-name">
    SS GRAND INN
</h2>

<div class="location">
    SAMARALAKOTA
</div>

    <div class="divider"></div>

    <p class="caption">
        Experience luxury, comfort and exceptional hospitality.
        We are delighted to have you with us and wish you a pleasant stay.
    </p>

    <a href="home.html" class="btn">
        Get Started →
    </a>

</div>

</body>
</html>

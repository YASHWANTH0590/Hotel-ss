
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Samarlakota | SS HOTELS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Times New Roman', Times, serif;
}

:root{
    --charcoal:#121212;
    --charcoal-dark:#0A0A0A;
    --charcoal-card:#1C1C1C;
    --gold:#D4AF37;
    --gold-soft:#C9A66B;
    --gold-pale:#E8D9B5;
    --cream:#F2EDE2;
    --border-gold:rgba(212,175,55,.25);
}

body{
    background:var(--charcoal);
    color:var(--cream);
    min-height:100vh;
    background-image:
        radial-gradient(circle at 15% 0%, rgba(212,175,55,.06), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(212,175,55,.05), transparent 45%);
}

.navbar{
    background:var(--charcoal-dark);
    border-bottom:1px solid var(--border-gold);
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    background:linear-gradient(
        120deg,
        var(--gold-pale),
        var(--gold),
        var(--gold-soft)
    );
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    
    font-weight:700;
    letter-spacing:4px;
    text-decoration:none;
    font-size: 20px;
}

.nav-right{
    display:flex;
    gap:12px;
}

.back-btn{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:10px 18px;
    border-radius:10px;
    text-decoration:none;
    transition:.3s;
}

.back-btn:hover{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
    padding:20px;
}

.coming-soon{
    max-width:700px;
    width:100%;
    text-align:center;
    background:var(--charcoal-card);
    border:1px solid var(--border-gold);
    border-radius:20px;
    padding:50px 30px;
}

.coming-soon h1{
    color:var(--gold-pale);
    margin-bottom:15px;
    font-size:38px;
}

.coming-soon p{
    color:var(--gold-soft);
    font-size:18px;
    line-height:1.8;
}

@media(max-width:768px){

    .logo{
        font-size:22px;
    }

    .coming-soon h1{
        font-size:28px;
    }

    .coming-soon p{
        font-size:16px;
    }
}
</style>

</head>
<body>

<nav class="navbar">

<a href="index.html" class="logo">
    SS HOTELS
</a>

<div class="nav-right">
    <!-- <a href="index.html" class="back-btn">
        ← Back
    </a> -->
</div>


</nav>

<div class="container">

<div class="coming-soon">

    <h1>🗺️ Explore Samarlakota</h1>
    <h2>Coming Soon...</h2>
</div>

</div>

</body>
</html>

</html>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Times New Roman', Times, serif;
}

:root{
    --charcoal:#121212;
    --charcoal-dark:#0A0A0A;
    --charcoal-card:#1C1C1C;
    --gold:#D4AF37;
    --gold-soft:#C9A66B;
    --gold-pale:#E8D9B5;
    --cream:#F2EDE2;
    --border-gold:rgba(212,175,55,.25);
}

body{
    background:var(--charcoal);
    color:var(--cream);
    min-height:100vh;
    background-image:
        radial-gradient(circle at 15% 0%, rgba(212,175,55,.06), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(212,175,55,.05), transparent 45%);
}

.navbar{
    background:var(--charcoal-dark);
    border-bottom:1px solid var(--border-gold);
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    background:linear-gradient(
        120deg,
        var(--gold-pale),
        var(--gold),
        var(--gold-soft)
    );
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    
    font-weight:700;
    letter-spacing:4px;
    text-decoration:none;
    font-size: 20px;
}

.nav-right{
    display:flex;
    gap:12px;
}

.back-btn{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:10px 18px;
    border-radius:10px;
    text-decoration:none;
    transition:.3s;
}

.back-btn:hover{
    background:var(--gold);
    color:var(--charcoal-dark);
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
    padding:20px;
}

.coming-soon{
    max-width:700px;
    width:100%;
    text-align:center;
    background:var(--charcoal-card);
    border:1px solid var(--border-gold);
    border-radius:20px;
    padding:50px 30px;
}

.coming-soon h1{
    color:var(--gold-pale);
    margin-bottom:15px;
    font-size:38px;
}

.coming-soon p{
    color:var(--gold-soft);
    font-size:18px;
    line-height:1.8;
}


@media(max-width:768px){

    .logo{
        font-size:22px;
    }

    .coming-soon h1{
        font-size:28px;
    }

    .coming-soon p{
        font-size:16px;
    }
}
.footer{
    background:#0A0A0A;
    border-top:1px solid rgba(212,175,55,0.25);
padding:10px 10px 10px;
    text-align:center;
    color:#F2EDE2;
    margin-top:80px;
}

.footer h2{
    color:#D4AF37;
    font-size:2rem;
    margin-bottom:15px;
    letter-spacing:3px;
    font-weight:700;
    text-transform:uppercase;
}

.footer p{
    color:#C9C9C9;
    margin:8px 0;
    font-size:15px;
    line-height:1.6;
}
.social-icons{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:25px 0;
}

.social-icons a{
    width:50px;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    border:1px solid #D4AF37;
    color:#D4AF37;
    text-decoration:none;
    font-size:22px;
    transition:.3s;
}

.social-icons a:hover{
    background:#D4AF37;
    color:#121212;
}
.social-icons a:hover{
    background:#D4AF37;
    color:#121212;
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(212,175,55,0.4);
}

.copyright{
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid rgba(212,175,55,0.15);
    color:#8F8F8F;
    font-size:14px;
    letter-spacing:1px;
}

@media(max-width:768px){
    .footer{
        padding:40px 15px 25px;
    }

    .footer h2{
        font-size:1.6rem;
    }

    .social-icons a{
        width:45px;
        height:45px;
        font-size:20px;
    }
}
</style>
